name: Test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        run: docker buildx build . --platform linux/amd64 --tag mongo-provision --load

      - name: Export image
        run: docker save mongo-provision | gzip > mongo-provision.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: mongo-provision-image
          path: mongo-provision.tar.gz
          retention-days: 1

  test:
    name: "${{ matrix.topology.name }} / ${{ matrix.version }}"
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        version: ["4.0", "4.2", "4.4", "5.0", "6.0", "7.0", "8.0"]
        topology:
          - name: single
          - name: replset-3
          - name: sharded-2x3

    steps:
      - name: Install mongosh
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y gnupg

          wget -qO- https://www.mongodb.org/static/pgp/server-8.0.asc | sudo tee /etc/apt/trusted.gpg.d/server-8.0.asc

          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list

          sudo apt-get update
          if [ "${{ matrix.version }}" = "4.0" ]; then
            sudo apt-get install -y mongodb-mongosh=2.5.6
          else
            sudo apt-get install -y mongodb-mongosh
          fi

          mongosh --version

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: mongo-provision-image
          path: .

      - name: Load Docker image
        run: gunzip -c mongo-provision.tar.gz | docker load

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Test
        run: ./test.py "${{ matrix.version }}" "${{ matrix.topology.name }}"

