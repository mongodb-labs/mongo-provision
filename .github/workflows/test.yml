name: Test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker buildx build . --platform linux/amd64 --tag mongo-provision

      - name: Export image
        run: docker save mongo-provision | gzip > mongo-provision.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: mongo-provision-image
          path: mongo-provision.tar.gz
          retention-days: 1

  test:
    name: "${{ matrix.topology }} / ${{ matrix.version }}"
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["4.0", "4.2", "4.4", "5.0", "6.0", "7.0", "8.0"]
        topology: [single, replset-3, sharded-2x3]
        include:
          - topology: single
            docker_run: -p 27017:27017
            mongo_args: --single
            ready_timeout: 5m
          - topology: replset-3
            docker_run: --network host
            mongo_args: --replicaset --nodes 3 --hostname localhost
            ready_timeout: 5m
          - topology: sharded-2x3
            docker_run: -p 27017:27017
            mongo_args: --replicaset --sharded 2 --nodes 3
            ready_timeout: 10m

    steps:
      - name: Install mongosh
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y gnupg

          wget -qO- https://www.mongodb.org/static/pgp/server-8.0.asc | sudo tee /etc/apt/trusted.gpg.d/server-8.0.asc

          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list

          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh=2.5.6

          mongosh --version

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: mongo-provision-image

      - name: Load Docker image
        run: docker load < mongo-provision.tar.gz

      - name: Test
        env:
          EXPECTED_VERSION: ${{ matrix.version }}
          TOPOLOGY: ${{ matrix.topology }}
        run: |
          set -euo pipefail

          cleanup() { docker rm -f mongo-test 2>/dev/null || true; }
          trap cleanup EXIT

          docker run -d --name mongo-test \
            ${{ matrix.docker_run }} \
            mongo-provision "$EXPECTED_VERSION" ${{ matrix.mongo_args }}

          echo "Waiting for cluster to be ready …"
          timeout ${{ matrix.ready_timeout }} bash -c '
            until docker exec mongo-test [ -e ready ] 2>/dev/null; do
              if ! docker ps -q --filter name=mongo-test --filter status=running | grep -q .; then
                echo "Container has exited:" >&2
                docker logs mongo-test >&2
                exit 1
              fi
              sleep 2
            done
          '

          docker logs mongo-test

          CONN=$(docker exec mongo-test cat ready | jq -r .connection_string)
          echo "Server is ready. Connection string: $CONN"

          if [ "$TOPOLOGY" = single ]; then

            mongosh "$CONN" --eval '
              const expected = process.env.EXPECTED_VERSION;
              const im = db.adminCommand({ isMaster: 1 });
              const ver = db.version();
              assert(
                ver.startsWith(expected),
                "Version mismatch: expected " + expected + ".x, got " + ver
              );
              assert(
                !im.setName,
                "Expected standalone, got setName=" + im.setName
              );
              print("PASS: version=" + ver + ", standalone");
            '

          elif [ "$TOPOLOGY" = replset-3 ]; then

            mongosh mongodb://localhost:27017 --eval '
              const expected = process.env.EXPECTED_VERSION;
              const im = db.adminCommand({ isMaster: 1 });
              const ver = db.version();
              assert(
                ver.startsWith(expected),
                "Version mismatch: expected " + expected + ".x, got " + ver
              );
              assert(im.setName, "Expected a replica set, got standalone");
              const status = db.adminCommand({ replSetGetStatus: 1 });
              assert(
                status.members.length === 3,
                "Expected 3 nodes, got " + status.members.length
              );
              print(
                "PASS: version=" + ver +
                ", replica set \"" + im.setName + "\"" +
                ", " + status.members.length + " nodes"
              );
            '

          elif [ "$TOPOLOGY" = sharded-2x3 ]; then

            mongosh "$CONN" --eval '
              const expected = process.env.EXPECTED_VERSION;
              const im = db.adminCommand({ isMaster: 1 });
              const ver = db.version();
              assert(
                ver.startsWith(expected),
                "Version mismatch: expected " + expected + ".x, got " + ver
              );
              assert(
                im.msg === "isdbgrid",
                "Expected mongos (isdbgrid), got: " + JSON.stringify(im)
              );
              const listShards = db.adminCommand({ listShards: 1 });
              assert(
                listShards.shards.length === 2,
                "Expected 2 shards, got " + listShards.shards.length
              );
              const firstShardHost = listShards.shards[0].host;
              const hostsStr = firstShardHost.includes("/")
                ? firstShardHost.split("/")[1]
                : firstShardHost;
              const nodeCount = hostsStr.split(",").length;
              assert(
                nodeCount === 3,
                "Expected 3 nodes/shard, got " + nodeCount +
                " (host: " + firstShardHost + ")"
              );
              print(
                "PASS: version=" + ver +
                ", " + listShards.shards.length + " shards" +
                ", " + nodeCount + " nodes/shard"
              );
            '

          fi
